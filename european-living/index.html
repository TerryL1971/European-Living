<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================================================
         PRIMARY META TAGS
         These are the fallback tags before React/SEO.tsx hydrates.
         SEO.tsx will override these per-page via JavaScript.
    ============================================================ -->
    <title>European Living | Resources for Americans in Europe</title>
    <meta name="description" content="Find English-speaking services, housing, and community resources for US military families and Americans living in Europe. Verified businesses near major US bases in Germany." />
    <meta name="keywords" content="US military Europe, American expats Germany, English services Germany, military housing Europe, PCS Germany, SOFA status, US bases Germany, Ramstein, Kaiserslautern, Stuttgart, Grafenwöhr" />
    <meta name="author" content="European Living" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.european-living.live" />

    <!-- ============================================================
         OPEN GRAPH — Facebook, LinkedIn, WhatsApp previews
         CRITICAL: Without these, Facebook ads show a blank link card.
    ============================================================ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="European Living" />
    <meta property="og:title" content="European Living | Resources for Americans in Europe" />
    <meta property="og:description" content="Find English-speaking services, housing, and community resources for US military families and Americans living in Europe. Verified businesses near major US bases in Germany." />
    <meta property="og:image" content="https://www.european-living.live/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="European Living — Resources for Americans in Europe" />
    <meta property="og:url" content="https://www.european-living.live" />
    <meta property="og:locale" content="en_US" />

    <!-- ============================================================
         TWITTER / X CARD
    ============================================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="European Living | Resources for Americans in Europe" />
    <meta name="twitter:description" content="Find English-speaking services, housing, and community resources for US military families living in Europe." />
    <meta name="twitter:image" content="https://www.european-living.live/og-image.jpg" />

    <!-- ============================================================
         PWA META TAGS
    ============================================================ -->
    <meta name="theme-color" content="#0284C7" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="EuroLiving" />

    <!-- ============================================================
         ICONS
    ============================================================ -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/EL_Logo.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#0284C7" />

    <!-- ============================================================
         PWA MANIFEST
    ============================================================ -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ============================================================
         PRECONNECT HINTS
         Establishes early connections to critical third-party origins,
         reducing latency for GA4 and Supabase requests.
    ============================================================ -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://pkacbcohrygpyapgtzpq.supabase.co" />

    <!-- ============================================================
         BRAND TYPEFACE (Inter)
         index.css declares font-family: Inter, but nothing was ever
         actually fetching it — every visitor was silently falling back
         to their OS system font. This loads the real thing.
    ============================================================ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- ============================================================
         SERVICE WORKER REGISTRATION
    ============================================================ -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js')
            .then(function(registration) {
              console.log('SW registered:', registration.scope);
            })
            .catch(function(error) {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>

    <!-- ============================================================
         SCHEMA.ORG — Organization structured data
         NOTE: SEO.tsx dynamically injects this at runtime via React
         Helmet. Do not add a static version here — it would duplicate.
    ============================================================ -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
