    <!-- ============================================================
         GITHUB PAGES SPA ROUTING FIX
         When GitHub Pages serves the 404.html, it encodes the real
         path into the query string. This script restores it so that
         React Router sees the correct URL.
         DO NOT REMOVE — this is required for all direct-URL navigation.
    ============================================================ -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
