<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>European Living</title>
    <script>
      // GitHub Pages SPA fix: redirect all 404s back to index.html
      // preserving the full path, query string, and hash.
      // The script in index.html picks this up and restores it.
      var l = window.location;
      var path = l.pathname.slice(1).split('/').join('~and~');
      l.replace(
        l.protocol + '//' + l.hostname +
        (l.port ? ':' + l.port : '') +
        '/?/' + path +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
